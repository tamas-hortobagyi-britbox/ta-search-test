<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TA Search Test</title>
    <style>
        /* ── Tokens ─────────────────────────────────────────── */
        :root {
            --bg:             #070711;
            --bg-surface:     rgba(255,255,255,0.03);
            --bg-surface-2:   rgba(255,255,255,0.055);
            --bg-input:       rgba(255,255,255,0.06);
            --text:           #e2e8f0;
            --text-muted:     #64748b;
            --text-dim:       #6b84a0;
            --accent:         #6366f1;
            --accent-bright:  #818cf8;
            --accent-glow:    rgba(99,102,241,0.35);
            --error:          #f87171;
            --border:         rgba(255,255,255,0.07);
            --radius:         14px;
            --radius-sm:      8px;
            --radius-pill:    999px;
            --blur:           blur(20px);
            --ease:           0.2s cubic-bezier(0.4,0,0.2,1);
            --spring:         0.3s cubic-bezier(0.34,1.56,0.64,1);
        }

        /* ── Reset ───────────────────────────────────────────── */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* ── Scrollbar ───────────────────────────────────────── */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18); }

        /* ── Base ────────────────────────────────────────────── */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse 80% 60% at 10% 0%,   rgba(99,102,241,0.09) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 90% 100%, rgba(139,92,246,0.07) 0%, transparent 60%);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }

        /* ── Header ──────────────────────────────────────────── */
        header {
            background: rgba(7,7,17,0.8);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            padding: 0.6rem 1.5rem;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        header h1 {
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            background: linear-gradient(120deg, #818cf8 0%, #a78bfa 50%, #38bdf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
        }

        /* ── Layout ──────────────────────────────────────────── */
        main { max-width: 1400px; margin: 0 auto; padding: 0.75rem 1rem; }
        section { margin-bottom: 0.75rem; }

        /* ── Config panel ────────────────────────────────────── */
        details {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            transition: border-color var(--ease);
        }

        details:hover { border-color: rgba(255,255,255,0.11); }

        summary {
            padding: 0.45rem 0.75rem;
            cursor: pointer;
            color: var(--text-dim);
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            list-style: none;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: color var(--ease);
            user-select: none;
        }
        summary::-webkit-details-marker { display: none; }

        summary::before {
            content: '›';
            font-size: 0.9rem;
            line-height: 1;
            transition: transform 0.2s ease;
            color: var(--text-muted);
        }

        details[open] summary::before { transform: rotate(90deg); }
        summary:hover { color: var(--text-muted); }

        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 0.5rem;
            padding: 0.5rem 0.75rem 0.75rem;
        }

        .field { display: flex; flex-direction: column; gap: 0.2rem; }

        label {
            font-size: 0.58rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            font-weight: 600;
        }

        input, textarea {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.3rem 0.5rem;
            color: var(--text);
            font-size: 0.7rem;
            transition: border-color var(--ease), box-shadow var(--ease);
            -webkit-appearance: none;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: rgba(99,102,241,0.55);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.12), inset 0 1px 0 rgba(255,255,255,0.04);
        }

        /* ── Search section ──────────────────────────────────── */
        #search {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.875rem 1rem;
            position: relative;
            overflow: hidden;
        }

        #search::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(99,102,241,0.04) 0%, transparent 55%);
            pointer-events: none;
        }

        .search-row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }

        .search-row input {
            flex: 1;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--radius-pill);
            padding: 0.45rem 1rem;
            font-size: 0.8rem;
        }

        .search-row input:focus {
            background: rgba(255,255,255,0.08);
            border-color: rgba(99,102,241,0.65);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15), 0 1px 8px rgba(0,0,0,0.25);
        }

        .search-row input::placeholder { color: var(--text-dim); }

        /* ── Buttons ─────────────────────────────────────────── */
        button {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            border: none;
            border-radius: var(--radius-pill);
            padding: 0.45rem 1.4rem;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: transform var(--ease), box-shadow var(--ease), opacity var(--ease);
            box-shadow: 0 2px 12px rgba(99,102,241,0.4);
            white-space: nowrap;
            position: relative;
        }

        button:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(99,102,241,0.55);
        }

        button:active:not(:disabled) { transform: translateY(0); }

        button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-secondary {
            background: rgba(99,102,241,0.1);
            color: var(--accent-bright);
            border: 1px solid rgba(99,102,241,0.28);
            border-radius: var(--radius-pill);
            padding: 0.22rem 0.75rem;
            font-size: 0.63rem;
            font-weight: 500;
            cursor: pointer;
            transition: background var(--ease), border-color var(--ease), transform var(--spring);
            white-space: nowrap;
        }

        .btn-secondary:hover {
            background: rgba(99,102,241,0.18);
            border-color: rgba(99,102,241,0.5);
            transform: translateY(-1px);
        }

        /* ── Toggle ──────────────────────────────────────────── */
        .search-options { margin-bottom: 0.45rem; }

        .toggle-label {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            font-size: 0.68rem;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            text-transform: none;
            letter-spacing: normal;
            transition: color var(--ease);
        }

        .toggle-label:hover { color: var(--text); }

        .toggle-label input[type="checkbox"] {
            -webkit-appearance: checkbox;
            appearance: checkbox;
            width: auto;
            padding: 0;
            border: none;
            background: none;
            box-shadow: none;
            cursor: pointer;
            accent-color: var(--accent);
        }

        /* ── Suggestions ─────────────────────────────────────── */
        #suggestions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.45rem;
            min-height: 0;
            margin-top: 0.5rem;
        }

        /* ── Textarea ────────────────────────────────────────── */
        textarea {
            width: 100%;
            min-height: 120px;
            font-family: 'Monaco', 'Menlo', 'Cascadia Code', monospace;
            font-size: 0.65rem;
            resize: vertical;
        }

        #search details { margin-top: 0.5rem; }
        #search details textarea { margin-top: 0.35rem; }

        /* ── Progress ────────────────────────────────────────── */
        #progress { display: none; color: var(--text-muted); font-size: 0.72rem; }
        #progress.visible { display: block; }

        .progress-text { display: flex; align-items: center; gap: 0.6rem; }

        .spinner {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--accent-bright);
            border-right-color: rgba(99,102,241,0.3);
            animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Error ───────────────────────────────────────────── */
        #error {
            display: none;
            background: rgba(248,113,113,0.07);
            border: 1px solid rgba(248,113,113,0.28);
            border-radius: var(--radius-sm);
            padding: 0.75rem 1rem;
            animation: fadeIn 0.2s ease;
        }

        #error.visible { display: block; }

        #error h3 {
            color: var(--error);
            font-size: 0.78rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
        }

        #error pre {
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.68rem;
            color: rgba(248,113,113,0.6);
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
        }

        /* ── Results grid ────────────────────────────────────── */
        #results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.75rem;
        }

        /* ── Result cards ────────────────────────────────────── */
        .result-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            cursor: pointer;
            position: relative;
            transition: transform var(--spring), border-color var(--ease), box-shadow var(--ease);
        }

        /* Rank + type badge */
        .result-badge {
            position: absolute;
            top: 5px;
            left: 5px;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 3px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            padding: 2px 6px;
            border-radius: 4px;
            line-height: 1.4;
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .result-badge .rank { color: rgba(255,255,255,0.6); }
        .result-badge .type-show  { color: #4ade80; }
        .result-badge .type-movie { color: #facc15; }

        .result-card:hover {
            transform: translateY(-4px) scale(1.025);
            border-color: rgba(99,102,241,0.55);
            box-shadow:
                0 8px 30px rgba(0,0,0,0.5),
                0 0 0 1px rgba(99,102,241,0.2),
                0 0 24px rgba(99,102,241,0.12);
        }

        .result-card img {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;

            background-size: cover;
            background-repeat: no-repeat;
            display: block;
            transition: transform var(--ease);
        }

        .result-card:hover img { transform: scale(1.04); }

        .result-card .title {
            padding: 0.4rem 0.5rem;
            font-size: 0.63rem;
            color: rgba(255,255,255,0.72);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: linear-gradient(to bottom, rgba(255,255,255,0.02), rgba(0,0,0,0.12));
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .result-card .title.loading {
            color: var(--text-dim);
            font-style: italic;
            animation: pulse 1.8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50%       { opacity: 0.9; }
        }

        /* ── Modal ───────────────────────────────────────────── */
        #modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.72);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 100;
            cursor: pointer;
        }

        #modal-overlay.visible {
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.18s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #modal-box {
            background: rgba(10,10,22,0.97);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            padding: 1.75rem;
            max-width: 640px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            cursor: default;
            position: relative;
            box-shadow:
                0 32px 80px rgba(0,0,0,0.65),
                0 0 0 1px rgba(255,255,255,0.05),
                0 0 60px rgba(99,102,241,0.08);
            animation: slideUp 0.28s cubic-bezier(0.34,1.56,0.64,1);
        }

        /* Top shimmer line */
        #modal-box::before {
            content: '';
            position: absolute;
            top: 0; left: 8%; right: 8%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(99,102,241,0.55), rgba(167,139,250,0.45), transparent);
            border-radius: 0 0 1px 1px;
        }

        @keyframes slideUp {
            from { transform: translateY(24px) scale(0.96); opacity: 0; }
            to   { transform: translateY(0)    scale(1);    opacity: 1; }
        }

        #modal-box h2 {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--text);
            letter-spacing: -0.02em;
            line-height: 1.3;
        }

        #modal-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.65;
            margin-bottom: 1.25rem;
        }

        .modal-section-label {
            font-size: 0.58rem;
            text-transform: uppercase;

    <script src="termProcess.js"></script>
    <script>
        // DOM elements
        const searchTermInput = document.getElementById('search-term');
        const searchBtn = document.getElementById('search-btn');
        const searchBodyTextarea = document.getElementById('search-body');
        const progressSection = document.getElementById('progress');
        const progressText = document.getElementById('progress-text');
        const errorSection = document.getElementById('error');
        const errorText = document.getElementById('error-text');
        const resultsSection = document.getElementById('results');

        // Config getters
        function getConfig() {
            return {
                host: document.getElementById('cfg-host').value,
                port: document.getElementById('cfg-port').value,
                rocketItemQuery: document.getElementById('cfg-rocket').value,
                searchUseCase: document.getElementById('cfg-usecase').value,
                suggesterUseCase: document.getElementById('cfg-suggester').value
            };
        }

        // AbortController for request cancellation
        let abortController = null;

        // Current search term for accuracy calculation
        let currentSearchTerm = '';

        // In-memory cache for item details (persists for the session)
        const itemCache = new Map();

        // Autosuggest state
        let suggestAbortController = null;
        let suggestDebounceTimer = null;

        // Strip trailing * or ~ from search term before sending to suggester
        function cleanTerm(term) {
            return term.replace(/[*~]+$/, '');
        }

        // Clear suggestion buttons (safe DOM removal)
        function clearSuggestions() {
            const el = document.getElementById('suggestions');
            while (el.firstChild) el.removeChild(el.firstChild);
        }

        // Render up to 5 suggestion buttons (XSS-safe: textContent only)
        function renderSuggestions(items) {
            clearSuggestions();
            const el = document.getElementById('suggestions');
            items.forEach(text => {
                const btn = document.createElement('button');
                btn.className = 'btn-secondary';
                btn.textContent = text;
                btn.addEventListener('click', () => {
                    searchTermInput.value = text;
                    clearSuggestions();
                    performSearch();
                });
                el.appendChild(btn);
            });
        }

        // Fetch autosuggest results from the suggester use case
        async function fetchSuggestions(rawTerm) {
            const term = cleanTerm(rawTerm.trim());
            if (!term) { clearSuggestions(); return; }

            if (suggestAbortController) suggestAbortController.abort();
            suggestAbortController = new AbortController();

            const { host, port, suggesterUseCase } = getConfig();
            const target = `${host}:${port}/composer/usecase/${suggesterUseCase}?userId=canta`;
            const url = `/proxy/${target}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ requestParameters: { language: 'en-US', term } }),
                    signal: suggestAbortController.signal
                });
                if (!response.ok) { clearSuggestions(); return; }
                const data = await response.json();
                const items = (data?.suggestionsResult?.suggestion ?? []).slice(0, 5);
                renderSuggestions(items);
            } catch (e) {
                if (e.name !== 'AbortError') clearSuggestions();
            }
        }

        // Levenshtein distance calculation
        function levenshtein(a, b) {
            const matrix = [];
            for (let i = 0; i <= b.length; i++) {
                matrix[i] = [i];
            }
            for (let j = 0; j <= a.length; j++) {
                matrix[0][j] = j;
            }
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b[i - 1] === a[j - 1]) {
                        matrix[i][j] = matrix[i - 1][j - 1];
                    } else {
                        matrix[i][j] = Math.min(
                            matrix[i - 1][j - 1] + 1,
                            matrix[i][j - 1] + 1,
                            matrix[i - 1][j] + 1
                        );
                    }
                }
            }
            return matrix[b.length][a.length];
        }

        // Calculate best match score between search term and target string
        function bestMatch(search, target) {
            if (!target) return 0;
            const s = search.toLowerCase();
            const t = target.toLowerCase();

            // Exact match
            if (t === s) return 1.0;

            // Contains match (normalized)
            if (t.includes(s)) {
                return 0.8 + (0.2 * s.length / t.length);
            }

            // Levenshtein fallback for fuzzy matching
            const distance = levenshtein(s, t);
            const maxLen = Math.max(s.length, t.length);
            return Math.max(0, 1 - (distance / maxLen));
        }

        // Calculate accuracy score for a result item
        function calculateAccuracy(searchTerm, title, credits = []) {
            // Check title match
            const term = searchTerm.split("*").join("").trim(); // Remove wildcards for matching
            const terms = term.split(" ");
            let score = 0;
            terms.forEach(t => {
                score += bestMatch(t, title);
            });
            const titleScore = terms.length > 0 ? score / terms.length : 0; // bestMatch(searchTerm, title);

            // Check credits match (find best matching person)
            let bestCreditScore = 0;
            for (const credit of credits) {
                if (credit.name) {
                    let score = 0;
                    terms.forEach(t => {
                        score += bestMatch(t, credit.name);
                    });
                    score = terms.length > 0 ? score / terms.length : 0;
                    // const score = bestMatch(searchTerm, credit.name);
                    if (score > bestCreditScore) {
                        bestCreditScore = score;
                    }
                }
            }

            // Return best of title or credit match as 0-100 integer
            return Math.round(Math.max(titleScore, bestCreditScore) * 100);
        }

        // Enable/disable search button based on input; trigger autosuggest
        searchTermInput.addEventListener('input', () => {
            const val = searchTermInput.value.trim();
            searchBtn.disabled = !val;

            clearTimeout(suggestDebounceTimer);
            if (val) {
                suggestDebounceTimer = setTimeout(() => fetchSuggestions(val), 300);
            } else {
                clearSuggestions();
            }
        });

        // Search on Enter key
        searchTermInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && searchTermInput.value.trim()) {
                performSearch();
            }
        });

        // Search button click
        searchBtn.addEventListener('click', performSearch);

        // Transform image URL: remove Height, set Width to 400
        function transformImageUrl(originalUrl) {
            if (!originalUrl) return '';
            try {
                const url = new URL(originalUrl);
                url.searchParams.delete('Height');
                url.searchParams.set('Width', '400');
                return url.toString();
            } catch {
                return originalUrl;
            }
        }

        // Create result card using DOM methods (safe, no innerHTML)
        function createResultCard(itemId, rank, itemType) {

        // Update result card with data and accuracy score
        function updateResultCard(itemId, title, imageUrl, credits = []) {
            const card = resultsSection.querySelector(`[data-item-id="${itemId}"]`);
            if (!card) return;

            const img = card.querySelector('img');
            const titleEl = card.querySelector('.title');

            if (imageUrl) {
                img.src = transformImageUrl(imageUrl);
                img.alt = title;
            }

            // Calculate and display accuracy score
            const score = calculateAccuracy(currentSearchTerm, title, credits);
            titleEl.textContent = `(${score}) ${title || 'Untitled'}`;
            titleEl.classList.remove('loading');
        }

        // Fetch item details from Rocket API (via proxy to avoid CORS)
        async function fetchItemDetails(itemId, signal) {
            if (itemCache.has(itemId)) return itemCache.get(itemId);

            const config = getConfig();
            const targetUrl = config.rocketItemQuery.replace('[ID]', itemId);
            const url = `/proxy/${targetUrl}`;

            try {
                const response = await fetch(url, { signal });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                // images is an object with keys: tile, poster, wallpaper, etc.
                const imageUrl = data.images?.tile || data.images?.wallpaper || data.images?.poster || '';
                const result = {
                    title: data.title || data.name || 'Untitled',
                    imageUrl,
                    description: data.description || data.shortDescription || data.synopsis || '',
                    credits: data.credits || []
                };
                itemCache.set(itemId, result);
                return result;
            } catch (err) {
                if (err.name === 'AbortError') throw err;
                console.warn(`Failed to fetch item ${itemId}:`, err);
                return { title: `Item ${itemId}`, imageUrl: '', credits: [] };
            }
        }

        const modalTitleEl = document.getElementById('modal-title');
        const modalDescEl = document.getElementById('modal-desc');

        function getSearchTerms() {
            return currentSearchTerm.replace(/[*~]/g, '').trim().split(/\s+/).filter(Boolean).map(t => t.toLowerCase());
        }

        // Wu-Manber bit-parallel approximate substring search.
        // Returns array of [start, end) ranges where pattern matches text with
        // at most maxErrors insertions, deletions, or substitutions.
        function wuManberRanges(text, pattern, maxErrors) {
            const m = pattern.length;
            if (m === 0) return [];

            const tl = text.toLowerCase();
            const pl = pattern.toLowerCase();

            if (m > 31) {
                // Bitwise ops are 32-bit; fall back to exact for very long patterns
                const ranges = [];
                let i = tl.indexOf(pl);
                while (i !== -1) { ranges.push([i, i + m]); i = tl.indexOf(pl, i + 1); }
                return ranges;
            }

            // Build bitmask: bit i of pm[c] is set iff pl[i] === c
            const pm = Object.create(null);
            for (let i = 0; i < m; i++) pm[pl[i]] = (pm[pl[i]] || 0) | (1 << i);

            const MATCH = 1 << (m - 1);
            const MASK  = (1 << m) - 1;
            const R = new Array(maxErrors + 1).fill(0);
            const ranges = [];

            for (let pos = 0; pos < tl.length; pos++) {
                const d = pm[tl[pos]] || 0;
                const old = R.slice();

                R[0] = ((old[0] << 1) | 1) & d & MASK;

                for (let e = 1; e <= maxErrors; e++) {
                    R[e] = (((old[e] << 1) | 1) & d)  // match or start
                         | ((old[e-1] << 1) | 1)        // substitution
                         | old[e-1]                      // text insertion (skip text char)
                         | (R[e-1] << 1);               // pattern deletion (use updated R[e-1])
                    R[e] &= MASK;
                }

                for (let e = 0; e <= maxErrors; e++) {
                    if (R[e] & MATCH) {
                        ranges.push([findMatchStart(tl, pl, pos, maxErrors), pos + 1]);
                        break;
                    }
                }
            }

            return ranges;
        }

        // For a match ending at endPos, scan valid window lengths and pick the start
        // with the lowest edit distance (prefer longer span on ties for better context).
        function findMatchStart(text, pattern, endPos, k) {
            const m = pattern.length;
            let bestStart = Math.max(0, endPos - m + 1);
            let bestDist = Infinity;
            let bestLen = 0;
            for (let len = Math.max(1, m - k); len <= m + k; len++) {
                const s = endPos - len + 1;
                if (s < 0) continue;
                const dist = levenshtein(pattern, text.slice(s, endPos + 1));
                if (dist < bestDist || (dist === bestDist && len > bestLen)) {
                    bestDist = dist; bestStart = s; bestLen = len;
                }
            }
            return bestStart;
        }

        // Allowed edit distance per term length: exact for short terms to avoid noise
        function getErrorsForTerm(term) {
            if (term.length <= 2) return 0;
            if (term.length <= 6) return 1;
            return 2;
        }

        function highlightText(text, terms) {
            const fragment = document.createDocumentFragment();
            if (!text || !terms.length) { fragment.appendChild(document.createTextNode(text || '')); return fragment; }
            const ranges = [];
            for (const term of terms) {
                for (const r of wuManberRanges(text, term, getErrorsForTerm(term))) ranges.push(r);
            }
            if (!ranges.length) { fragment.appendChild(document.createTextNode(text)); return fragment; }
            ranges.sort((a, b) => a[0] - b[0]);
            const merged = [ranges[0]];
            for (let i = 1; i < ranges.length; i++) {
                const prev = merged[merged.length - 1];
                if (ranges[i][0] <= prev[1]) prev[1] = Math.max(prev[1], ranges[i][1]);
                else merged.push(ranges[i]);
            }
            let pos = 0;
            for (const [s, e] of merged) {
                if (pos < s) fragment.appendChild(document.createTextNode(text.slice(pos, s)));
                const mark = document.createElement('mark');
                mark.className = 'highlight';
                mark.textContent = text.slice(s, e);
                fragment.appendChild(mark);
                pos = e;
            }
            if (pos < text.length) fragment.appendChild(document.createTextNode(text.slice(pos)));
            return fragment;
        }

        function renderModalCredits(credits, terms) {
            modalCreditsEl.replaceChildren();
            if (!credits.length) return;

            const label = document.createElement('div');
            label.className = 'modal-section-label';
            label.textContent = 'Cast & Crew';
            modalCreditsEl.appendChild(label);

            credits.forEach(credit => {
                const row = document.createElement('div');
                row.className = 'modal-credit';
                row.appendChild(highlightText(credit.name || '', terms));
                const jobTitle = credit.role || credit.creditType;
                const character = credit.character;
                if (jobTitle || character) {
                    const meta = document.createElement('span');
                    meta.className = 'credit-role';
                    let text = jobTitle ? ` — ${jobTitle}` : '';
                    if (character) text += ` — (${character})`;
                    meta.textContent = text;
                    row.appendChild(meta);
                }
                modalCreditsEl.appendChild(row);
            });
        }

        function openModal(itemId) {
            modalOverlay.dataset.itemId = itemId;
            modalOverlay.classList.add('visible');

            const terms = getSearchTerms();
            const cached = itemCache.get(itemId);
            if (cached) {
                modalTitleEl.replaceChildren(highlightText(cached.title, terms));
                modalDescEl.replaceChildren(highlightText(cached.description || '', terms));
                renderModalCredits(cached.credits || [], terms);
            } else {
                // Item loaded via contentItemName path — show card title, fetch rest
                const card = resultsSection.querySelector(`[data-item-id="${itemId}"]`);
                modalTitleEl.textContent = card?.querySelector('.title')?.textContent || '';
                modalDescEl.textContent = '';
                modalCreditsEl.replaceChildren();
                fetchItemDetails(itemId, null).then(details => {
                    if (modalOverlay.dataset.itemId !== itemId) return;
                    modalTitleEl.replaceChildren(highlightText(details.title, terms));
                    modalDescEl.replaceChildren(highlightText(details.description || '', terms));
                    renderModalCredits(details.credits || [], terms);
                });
            }
        }

        // Close on overlay click; stop propagation on the box itself
        modalOverlay.addEventListener('click', closeModal);
        document.getElementById('modal-box').addEventListener('click', e => e.stopPropagation());

        function isEnhancedSearch() {
            return document.getElementById('enhanced-search').checked;
        }

        // Merge prefix and fuzzy results: prefix is the base, fuzzy items that already
        // exist are moved 1 step toward the front, new fuzzy items are appended.
        function mergeResults(prefixRecs, fuzzyRecs) {
            const toItem = item => ({ ...item, itemId: item.seriesId || item.contentItemId });
            const prefixItems = prefixRecs.map(toItem).filter(i => i.itemId);
            const fuzzyItems = fuzzyRecs.map(toItem).filter(i => i.itemId);

            const merged = [...prefixItems];

            for (const fuzzyItem of fuzzyItems) {
                const idx = merged.findIndex(m => m.itemId === fuzzyItem.itemId);
                if (idx > 0) {
                    // Already present — move one step toward the front
                    [merged[idx - 1], merged[idx]] = [merged[idx], merged[idx - 1]];
                } else if (idx === -1) {
                    merged.push(fuzzyItem);
                }
            }

            return merged;
        }

        // Main search function
        async function performSearch() {
            // Clear suggestions and cancel any in-flight suggestion request
            clearSuggestions();
            if (suggestAbortController) suggestAbortController.abort();

            // Cancel any in-flight requests
            if (abortController) {
                abortController.abort();
            }
            abortController = new AbortController();
            const signal = abortController.signal;

            // Clear UI
            hideError();
            clearResults();

            const searchTerm = searchTermInput.value.trim();
            if (!searchTerm) return;

            // Store for accuracy calculation
            currentSearchTerm = searchTerm;
            const processedTermPrefix = processSearchTerm(searchTerm, processConfigPrefix);
            const processedTermFuzzy = processSearchTerm(searchTerm, processConfigFuzzy);

            console.log(`Input "${searchTerm}" -> Prefix: "${processedTermPrefix}" | Fuzzy: "${processedTermFuzzy}"`);

            // Parse and update request body with search term
            let requestBody;
            try {
                requestBody = JSON.parse(searchBodyTextarea.value);
                requestBody.requestParameters.term = searchTerm;
            } catch (err) {
                showError('Invalid JSON in request body', err.message);
                return;
            }

            const config = getConfig();
            const targetUrl = `${config.host}:${config.port}/composer/usecase/${config.searchUseCase}?userId=canta`;
            const url = `/proxy/${targetUrl}`;

            try {
                let recommendations;

                if (isEnhancedSearch()) {
                    showProgress('Enhanced search: fetching...');

                    const prefixBody = JSON.parse(JSON.stringify(requestBody));
                    prefixBody.requestParameters.term = processedTermPrefix;
                    const fuzzyBody = JSON.parse(JSON.stringify(requestBody));
                    fuzzyBody.requestParameters.term = processedTermFuzzy;

                    const headers = { 'Accept': 'application/json', 'Content-Type': 'application/json' };
                    const [prefixResp, fuzzyResp] = await Promise.all([
                        fetch(url, { method: 'POST', headers, body: JSON.stringify(prefixBody), signal }),
                        fetch(url, { method: 'POST', headers, body: JSON.stringify(fuzzyBody), signal })
                    ]);

                    if (!prefixResp.ok) {
                        const text = await prefixResp.text();
                        throw new Error(`HTTP ${prefixResp.status}: ${text}`);
                    }
                    if (!fuzzyResp.ok) {
                        const text = await fuzzyResp.text();
                        throw new Error(`HTTP ${fuzzyResp.status}: ${text}`);
                    }

                    const [prefixData, fuzzyData] = await Promise.all([prefixResp.json(), fuzzyResp.json()]);
                    const prefixRecs = prefixData?.recommendationsResult?.recommendations?.recommendation || [];
                    const fuzzyRecs = fuzzyData?.recommendationsResult?.recommendations?.recommendation || [];

                    recommendations = mergeResults(prefixRecs, fuzzyRecs);
                } else {
                    showProgress('Searching...');

                    // Execute search API call (via proxy to avoid CORS)
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Accept': 'application/json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(requestBody),
                        signal
                    });

                    if (!response.ok) {
                        const text = await response.text();
                        throw new Error(`HTTP ${response.status}: ${text}`);
                    }

                    const data = await response.json();
                    recommendations = data?.recommendationsResult?.recommendations?.recommendation || [];
                }

                if (recommendations.length === 0) {
                    hideProgress();
                    showError('No results found');
                    return;
                }

                showProgress(`Found ${recommendations.length} results. Loading details...`);

                // Create cards for each result
                const itemsToFetch = [];
                let rank = 0;
                recommendations.forEach((item, index) => {
                    const itemId = item.seriesId || item.contentItemId;
                    if (!itemId) return;
                    rank++;
                    const itemType = item.seriesId ? 'show' : 'movie';
                    const card = createResultCard(itemId, rank, itemType);
                    resultsSection.appendChild(card);

                    // If contentItemName exists, use it directly
                    if (item.contentItemName && item.imageUrl) {
                        updateResultCard(itemId, item.contentItemName, item.imageUrl || '');
                    } else {
                        itemsToFetch.push({ itemId, index });
                    }
                });

                // Fetch remaining item details in parallel
                if (itemsToFetch.length > 0) {
                    let completed = 0;
                    const total = itemsToFetch.length;

                    const fetchPromises = itemsToFetch.map(async ({ itemId }) => {
                        try {
                            const details = await fetchItemDetails(itemId, signal);
                            updateResultCard(itemId, details.title, details.imageUrl, details.credits);
                        } finally {
                            completed++;
                            showProgress(`Loading item details: ${completed}/${total}`);
                        }
                    });

                    await Promise.all(fetchPromises);
                }

                hideProgress();

            } catch (err) {
                if (err.name === 'AbortError') {
                    // Request was cancelled, ignore
                    return;
                }
                hideProgress();
                showError('Search failed', err.message);
            }
        }
    </script>
</body>
